# dépôt privé. Ne pas éditer à la main : toute modification serait
# écrasée à la prochaine publication.
name: Vigeos Agent
version: 1.1.19
slug: vigeos_agent
description: Configuration automatique de la box Vigeos — activation par QR code depuis
  l'application, détection de chute, envoi des alertes et chiffrement de bout en bout
  des clips.
url: https://vigeos.fr
arch:
- aarch64
- amd64
init: false
boot: auto
startup: services
hassio_api: true
hassio_role: manager
homeassistant_api: true
host_network: true
host_dbus: true
privileged:
- NET_ADMIN
devices:
- /dev/tty1
- /dev/fb0
map:
- homeassistant_config:rw
- media:ro
- addon_configs:rw
- share:rw
services:
- mqtt:want
options:
  kit_code: ''
  kit_secret: ''
  api_base: https://api.vigeos.fr
  fall_detection: true
  mqtt_host: core-mosquitto
  frigate_slug: ccab4aaf_frigate
  frigate_config: /addon_configs/ccab4aaf_frigate/config.yml
schema:
  kit_code: str?
  kit_secret: password?
  api_base: url
  fall_detection: bool
  mqtt_host: str
  frigate_slug: str
  frigate_config: str
image: ghcr.io/lixisr/vigeos-agent-{arch}
